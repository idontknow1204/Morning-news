name: Update News Data

on:
  schedule:
    - cron: '0 21 * * *' # 06:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Update news data
        run: npm run update-news

      - name: Validate generated news data
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const dataPath = path.join(process.cwd(), 'public', 'data.json');
          const data = JSON.parse(fs.readFileSync(dataPath, 'utf8'));
          const koreanCount = Array.isArray(data.koreanNews) ? data.koreanNews.length : 0;
          const globalCount = Array.isArray(data.globalNews) ? data.globalNews.length : 0;

          console.log(`Validation counts -> Korean: ${koreanCount}, Global: ${globalCount}`);

          if (koreanCount === 0 || globalCount === 0) {
            console.error('Validation failed: koreanNews or globalNews is empty.');
            process.exit(1);
          }
          EOF
        
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data.json
          git commit -m "chore: update news data [automated]" || echo "No changes to commit"
          git push
